name: Build Sender & Receiver APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sender:
    name: Build Sender.apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x sender/gradlew
      - name: Build Sender APK
        working-directory: sender
        run: ./gradlew assembleDebug --no-daemon
      - run: mv sender/app/build/outputs/apk/debug/app-debug.apk Sender.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Sender
          path: Sender.apk
          retention-days: 30

  build-receiver:
    name: Build Receiver.apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x receiver/gradlew
      - name: Build Receiver APK
        working-directory: receiver
        run: ./gradlew assembleDebug --no-daemon
      - run: mv receiver/app/build/outputs/apk/debug/app-debug.apk Receiver.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Receiver
          path: Receiver.apk
          retention-days: 30
